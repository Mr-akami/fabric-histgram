<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fabric Histogram</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="app">
    <!-- Left pane: info panel -->
    <aside class="info-panel">
      <h1>Fabric Histogram</h1>

      <div class="file-input-area" id="drop-zone">
        <label for="file-input">ファイルを選択</label>
        <input type="file" id="file-input" accept="image/png,image/jpeg,image/gif,image/bmp">
        <p>またはここにドラッグ＆ドロップ</p>
      </div>

      <div id="pixel-info">
        <div class="info-section">
          <h2>RGB</h2>
          <span data-info="rgb">—</span>
        </div>
        <div class="info-section">
          <h2>HSV</h2>
          <span data-info="hsv">—</span>
        </div>
        <div class="info-section">
          <h2>Hex</h2>
          <span data-info="hex">—</span>
        </div>
        <div class="info-section">
          <h2>座標</h2>
          <span data-info="coords">—</span>
        </div>
        <div class="info-section">
          <h2>色カテゴリ</h2>
          <span data-info="category">—</span>
        </div>
        <div class="info-section assign-section" data-info="assign-section" style="display: none;">
          <h2>カテゴリへ追加</h2>
          <div class="assign-control">
            <select data-info="assign-target"></select>
            <button data-info="assign-btn" class="action-btn assign-btn">追加</button>
          </div>
          <span class="assign-note" data-info="assign-note"></span>
        </div>
      </div>

      <div id="area-report"></div>

      <div class="report-actions" id="report-actions" style="display: none;">
        <button id="print-report" class="action-btn">印刷</button>
        <button id="open-preset-editor" class="action-btn">プリセット編集</button>
      </div>
    </aside>

    <!-- Right pane: canvas -->
    <main class="canvas-area" id="canvas-area">
      <canvas id="image-canvas"></canvas>
      <span class="placeholder-text" id="placeholder">画像を読み込んでください</span>
    </main>

    <!-- Floating histogram panel -->
    <div class="histogram-panel" id="histogram-panel" style="display: none;"></div>

    <!-- Histogram toggle button -->
    <button class="histogram-toggle" id="histogram-toggle">📊 ヒストグラム</button>

    <!-- Preset editor modal -->
    <div class="preset-modal" id="preset-modal" style="display: none;">
      <div class="preset-dialog">
        <header class="preset-dialog-header">
          <h2>プリセット編集</h2>
          <button class="preset-close" data-pe="close" aria-label="閉じる">×</button>
        </header>
        <div class="preset-selector">
          <label>プリセット:</label>
          <select data-pe="active-select"></select>
          <button class="action-btn" data-pe="new-preset">+ 新規</button>
          <button class="action-btn" data-pe="duplicate-preset">複製</button>
          <button class="action-btn" data-pe="rename-preset">リネーム</button>
          <button class="action-btn" data-pe="delete-preset">削除</button>
        </div>
        <div class="preset-viz" data-pe="viz">
          <div class="viz-block" data-pe="viz-hsv">
            <h3>HSV カバレッジ</h3>
            <div class="viz-row">
              <canvas data-pe="wheel" width="240" height="240"></canvas>
              <div class="viz-vbar-wrap">
                <span class="viz-axis-label">V</span>
                <canvas data-pe="vbar" width="36" height="240"></canvas>
              </div>
            </div>
          </div>
          <div class="viz-block" data-pe="viz-rgb">
            <h3>RGB カバレッジ</h3>
            <div class="viz-rgb-stack">
              <label>R</label><canvas data-pe="rgb-r" width="280" height="20"></canvas>
              <label>G</label><canvas data-pe="rgb-g" width="280" height="20"></canvas>
              <label>B</label><canvas data-pe="rgb-b" width="280" height="20"></canvas>
            </div>
          </div>
        </div>
        <div class="preset-list" data-pe="list"></div>
        <footer class="preset-dialog-footer">
          <button class="action-btn" data-pe="add">+ カテゴリ追加</button>
          <button class="action-btn" data-pe="reset">このプリセットをデフォルトに戻す</button>
          <button class="action-btn" data-pe="close">閉じる</button>
        </footer>
      </div>
    </div>
  </div>

  <script>window.FH = {};</script>
  <script src="js/color-converter.js"></script>
  <script src="js/color-presets.js"></script>
  <script src="js/color-classifier.js"></script>
  <script src="js/canvas-renderer.js"></script>
  <script src="js/image-loader.js"></script>
  <script src="js/pixel-inspector.js"></script>
  <script src="js/histogram-analyzer.js"></script>
  <script src="js/histogram-panel.js"></script>
  <script src="js/area-report.js"></script>
  <script src="js/preset-visualizer.js"></script>
  <script src="js/preset-editor.js"></script>
  <script>
    (function () {
      'use strict';

      var fileInput = document.getElementById('file-input');
      var dropZone = document.getElementById('drop-zone');
      var canvas = document.getElementById('image-canvas');
      var infoPanel = document.getElementById('pixel-info');
      var placeholder = document.getElementById('placeholder');
      var histogramPanel = document.getElementById('histogram-panel');
      var histogramToggle = document.getElementById('histogram-toggle');
      var areaReport = document.getElementById('area-report');
      var printButton = document.getElementById('print-report');
      var reportActions = document.getElementById('report-actions');
      var presetModal = document.getElementById('preset-modal');
      var openPresetBtn = document.getElementById('open-preset-editor');

      FH.ColorPresets.load();
      FH.HistogramPanel.init(histogramPanel, histogramToggle);
      FH.AreaReport.init(areaReport, printButton);
      FH.PresetEditor.init(openPresetBtn, presetModal);

      FH.ImageLoader.init(fileInput, dropZone, function (image) {
        FH.CanvasRenderer.render(canvas, image);
        canvas.classList.add('visible');
        placeholder.style.display = 'none';

        var fullData = FH.CanvasRenderer.getFullImageData();
        var histData = FH.HistogramAnalyzer.analyze(fullData);
        FH.HistogramPanel.render(histData);

        FH.AreaReport.analyze(fullData);
        reportActions.style.display = 'flex';
      });

      FH.PixelInspector.init(canvas, infoPanel);

      dropZone.addEventListener('dragover', function () {
        dropZone.classList.add('dragover');
      });
      dropZone.addEventListener('dragleave', function () {
        dropZone.classList.remove('dragover');
      });
      dropZone.addEventListener('drop', function () {
        dropZone.classList.remove('dragover');
      });
    })();
  </script>
</body>
</html>
